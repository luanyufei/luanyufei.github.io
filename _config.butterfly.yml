inject:
  head:
    - >-
      <script>(function(){try{var raw=localStorage.getItem('theme');var saved;if(raw){try{var parsed=JSON.parse(raw);if(!parsed.expiry||Date.now()<=parsed.expiry)saved=parsed.value}catch(e){saved=raw}}var mode=saved==='light'||saved==='dark'?saved:(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',mode);document.documentElement.classList.add('js')}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
    - <link rel="stylesheet" href="/css/cyber-background.css">
  bottom:
    - <script src="/js/site-ui.js" defer></script>

